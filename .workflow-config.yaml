project:
  name: bessa_patterns.ts
  type: typescript-library
  description: Library of Reusable Design Patterns in TypeScript
  kind: configuration_library
  version: 0.12.2-alpha

tech_stack:
  primary_language: typescript
  secondary_languages:
    - javascript
  build_system: npm
  test_framework: jest
  test_command: npm test
  lint_command: npm run lint

structure:
  source_dirs:
    - src
  test_dirs:
    - test
  docs_dirs:
    - docs

workflow:
  stages:
    quick:
      enabled: true
      steps:
        - step_00
        - step_01
        - step_02
    medium:
      enabled: true
      steps:
        - step_00
        - step_01
        - step_02
        - step_03
        - step_04
        - step_05
    full:
      enabled: true
      steps:
        - step_00
        - step_01
        - step_02
        - step_03
        - step_04
        - step_05
        - step_06
        - step_07
        - step_08
        - step_0f

validation:
  documentation:
    required: true
    min_coverage: 80 # Minimum % of public APIs/modules with doc coverage
  testing:
    required: true
    min_coverage: 70 # Minimum % line/branch test coverage

deploy:
  enabled: true
  script: scripts/deploy.sh # Invoked by: ai-workflow deploy
  description: Build and publish to npm
